<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Coin Catalog - Numismatist's Guide</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- AOS (анімація) -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/custom.css">
    
    <style>
        .filter-sidebar {
            transition: all 0.3s ease;
        }
        .coin-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .coin-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .filter-active {
            background-color: #fbbf24;
            color: #000;
        }
        html.dark {
            background-color: #0a0a0a;
        }
        html.light {
            background-color: #f5f5f5;
        }
        html.light .bg-gray-900 {
            background-color: #ffffff !important;
        }
        html.light .text-gray-300 {
            color: #4a4a4a !important;
        }
        html.light .border-gray-800 {
            border-color: #e5e5e5 !important;
        }
        html.light .bg-gray-800 {
            background-color: #f0f0f0 !important;
        }
        .pagination-btn {
            transition: all 0.2s ease;
        }
        .pagination-btn:hover:not(:disabled) {
            background-color: #fbbf24;
            color: #000;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 transition-colors duration-300">

<div id="header-placeholder"></div>

<!-- ============================================ -->
<!-- ЗАГОЛОВОК СТОРІНКИ -->
<!-- ============================================ -->
<section class="bg-gradient-to-r from-gray-800 to-gray-900 py-12">
    <div class="container mx-auto px-4">
        <h1 class="text-4xl md:text-5xl font-bold text-center" data-aos="fade-up">Coin Catalog</h1>
        <p class="text-gray-400 text-center mt-2" data-aos="fade-up" data-aos-delay="100">Explore our collection of rare and valuable coins from around the world</p>
    </div>
</section>

<!-- ============================================ -->
<!-- ОСНОВНИЙ КОНТЕНТ: ФІЛЬТРИ + КАТАЛОГ -->
<!-- ============================================ -->
<section class="py-12 container mx-auto px-4">
    <div class="flex flex-col lg:flex-row gap-8">
        
        <!-- ==================== БІЧНА ПАНЕЛЬ ФІЛЬТРІВ ==================== -->
        <div class="lg:w-80 filter-sidebar">
            <div class="bg-gray-800 rounded-xl p-6 sticky top-24">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold"><i class="fas fa-filter mr-2 text-yellow-500"></i> Filters</h3>
                    <button onclick="resetFilters()" class="text-sm text-yellow-500 hover:text-yellow-400 transition">Reset All</button>
                </div>
                
                <!-- Пошук -->
                <div class="mb-6">
                    <label class="block text-gray-300 mb-2">Search</label>
                    <input type="text" id="searchInput" placeholder="Coin name, country..." 
                        class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-yellow-500">
                </div>
                
                <!-- Країна -->
                <div class="mb-6">
                    <label class="block text-gray-300 mb-2">Country</label>
                    <select id="countryFilter" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-yellow-500">
                        <option value="">All Countries</option>
                        <option value="Ukraine">Ukraine</option>
                        <option value="USA">USA</option>
                        <option value="United Kingdom">United Kingdom</option>
                        <option value="Germany">Germany</option>
                        <option value="China">China</option>
                        <option value="Greece">Greece</option>
                        <option value="Rome">Rome</option>
                    </select>
                </div>
                
                <!-- Метал -->
                <div class="mb-6">
                    <label class="block text-gray-300 mb-2">Metal Type</label>
                    <div class="space-y-2">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" value="gold" class="metal-filter w-4 h-4 rounded border-gray-600 bg-gray-700 text-yellow-500">
                            <span>Gold <span class="text-gray-500 text-sm">(503 coins)</span></span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" value="silver" class="metal-filter w-4 h-4 rounded border-gray-600 bg-gray-700 text-yellow-500">
                            <span>Silver <span class="text-gray-500 text-sm">(1,245 coins)</span></span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" value="bronze" class="metal-filter w-4 h-4 rounded border-gray-600 bg-gray-700 text-yellow-500">
                            <span>Bronze <span class="text-gray-500 text-sm">(684 coins)</span></span>
                        </label>
                    </div>
                </div>
                
                <!-- Діапазон років -->
                <div class="mb-6">
                    <label class="block text-gray-300 mb-2">Year Range</label>
                    <div class="flex gap-3">
                        <input type="number" id="yearFrom" placeholder="From" class="w-1/2 px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-yellow-500">
                        <input type="number" id="yearTo" placeholder="To" class="w-1/2 px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-yellow-500">
                    </div>
                </div>
                
                <!-- Діапазон цін -->
                <div class="mb-6">
                    <label class="block text-gray-300 mb-2">Price Range (USD)</label>
                    <div class="flex gap-3">
                        <input type="number" id="priceMin" placeholder="Min $" class="w-1/2 px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-yellow-500">
                        <input type="number" id="priceMax" placeholder="Max $" class="w-1/2 px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-yellow-500">
                    </div>
                </div>
                
                <!-- Рідкість -->
                <div class="mb-6">
                    <label class="block text-gray-300 mb-2">Rarity (1-10)</label>
                    <div class="flex gap-3">
                        <input type="number" id="rarityMin" min="1" max="10" placeholder="Min" class="w-1/2 px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-yellow-500">
                        <input type="number" id="rarityMax" min="1" max="10" placeholder="Max" class="w-1/2 px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-yellow-500">
                    </div>
                </div>
                
                <button onclick="applyFilters()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 rounded-lg transition">
                    <i class="fas fa-search mr-2"></i> Apply Filters
                </button>
            </div>
        </div>
        
        <!-- ==================== КАТАЛОГ МОНЕТ ==================== -->
        <div class="flex-1">
            
            <!-- Сортування -->
            <div class="bg-gray-800 rounded-xl p-4 mb-6 flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <span class="text-gray-400"><i class="fas fa-sort mr-1"></i> Sort by:</span>
                    <select id="sortBy" class="px-3 py-1 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-yellow-500">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="priceLow">Price: Low to High</option>
                        <option value="priceHigh">Price: High to Low</option>
                        <option value="rarityHigh">Rarity: High to Low</option>
                    </select>
                </div>
                <div class="text-gray-400 text-sm" id="resultsCount">Showing 0 coins</div>
            </div>
            
            <!-- Сітка монет -->
            <div id="coinsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Динамічне завантаження через JS -->
            </div>
            
            <!-- Пагінація -->
            <div id="pagination" class="flex justify-center gap-2 mt-8">
                <!-- Динамічне завантаження -->
            </div>
            
        </div>
    </div>
</section>

<!-- ============================================ -->
<!-- МОДАЛЬНЕ ВІКНО ДЕТАЛЕЙ МОНЕТИ -->
<!-- ============================================ -->
<div id="coinModal" class="fixed inset-0 bg-black bg-opacity-75 z-50 hidden items-center justify-center p-4" onclick="if(event.target === this) closeModal()">
    <div class="bg-gray-800 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
        <div class="sticky top-0 bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center">
            <h3 id="modalTitle" class="text-2xl font-bold text-yellow-500">Coin Details</h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
        </div>
        <div id="modalContent" class="p-6">
            <!-- Динамічний вміст -->
        </div>
    </div>
</div>

<!-- Підключення JS -->
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/catalog.js"></script>

<script>
    // ============================================
    // CATALOG.JS - ЛОГІКА КАТАЛОГУ (повний дубляж на всяк випадок)
    // ============================================
    
    let allCoins = [];
    let filteredCoins = [];
    let currentPage = 1;
    const coinsPerPage = 9;
    let currentCoinId = null;
    
    // Завантаження даних
    function loadCatalogData() {
        allCoins = loadCoins().filter(c => c.status === 'approved');
        applyFilters();
    }
    
    // Застосування фільтрів
    function applyFilters() {
        const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
        const country = document.getElementById('countryFilter')?.value || '';
        const metals = Array.from(document.querySelectorAll('.metal-filter:checked')).map(cb => cb.value);
        const yearFrom = parseInt(document.getElementById('yearFrom')?.value) || -5000;
        const yearTo = parseInt(document.getElementById('yearTo')?.value) || 3000;
        const priceMin = parseFloat(document.getElementById('priceMin')?.value) || 0;
        const priceMax = parseFloat(document.getElementById('priceMax')?.value) || Infinity;
        const rarityMin = parseInt(document.getElementById('rarityMin')?.value) || 1;
        const rarityMax = parseInt(document.getElementById('rarityMax')?.value) || 10;
        
        filteredCoins = allCoins.filter(coin => {
            // Пошук
            if (search && !coin.name.en.toLowerCase().includes(search) && !coin.country.toLowerCase().includes(search)) return false;
            // Країна
            if (country && coin.country !== country) return false;
            // Метал
            if (metals.length > 0 && !metals.includes(coin.metalType)) return false;
            // Рік
            if (coin.year < yearFrom || coin.year > yearTo) return false;
            // Ціна
            if (coin.priceUSD < priceMin || coin.priceUSD > priceMax) return false;
            // Рідкість
            if (coin.rarity < rarityMin || coin.rarity > rarityMax) return false;
            return true;
        });
        
        // Сортування
        const sortBy = document.getElementById('sortBy')?.value || 'newest';
        if (sortBy === 'newest') filteredCoins.sort((a, b) => b.year - a.year);
        else if (sortBy === 'oldest') filteredCoins.sort((a, b) => a.year - b.year);
        else if (sortBy === 'priceLow') filteredCoins.sort((a, b) => a.priceUSD - b.priceUSD);
        else if (sortBy === 'priceHigh') filteredCoins.sort((a, b) => b.priceUSD - a.priceUSD);
        else if (sortBy === 'rarityHigh') filteredCoins.sort((a, b) => b.rarity - a.rarity);
        
        document.getElementById('resultsCount').innerHTML = `Showing ${filteredCoins.length} coins`;
        currentPage = 1;
        renderCoins();
        renderPagination();
    }
    
    // Відображення монет
    function renderCoins() {
        const grid = document.getElementById('coinsGrid');
        if (!grid) return;
        
        const start = (currentPage - 1) * coinsPerPage;
        const end = start + coinsPerPage;
        const pageCoins = filteredCoins.slice(start, end);
        
        if (pageCoins.length === 0) {
            grid.innerHTML = `<div class="col-span-full text-center py-12"><i class="fas fa-search text-5xl text-gray-600 mb-4"></i><p class="text-gray-400">No coins found matching your criteria</p></div>`;
            return;
        }
        
        grid.innerHTML = pageCoins.map(coin => `
            <div class="coin-card bg-gray-800 rounded-xl overflow-hidden shadow-lg" onclick="openModal('${coin.id}')">
                <div class="h-48 bg-gray-700 flex items-center justify-center">
                    <i class="fas fa-coins text-5xl text-yellow-500"></i>
                </div>
                <div class="p-4">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-lg font-bold">${coin.name.en}</h3>
                        <span class="px-2 py-1 bg-yellow-500/20 text-yellow-500 rounded-full text-xs">R${coin.rarity}</span>
                    </div>
                    <p class="text-gray-400 text-sm mb-1">${coin.country} • ${coin.year}</p>
                    <p class="text-gray-400 text-sm mb-2">${coin.metal} • ${coin.weight}g</p>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-yellow-500 font-bold text-xl">$${coin.priceUSD}</span>
                        <button class="text-gray-400 hover:text-yellow-500 transition" onclick="event.stopPropagation(); addToCollection('${coin.id}')">
                            <i class="far fa-heart"></i>
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    // Пагінація
    function renderPagination() {
        const container = document.getElementById('pagination');
        if (!container) return;
        
        const totalPages = Math.ceil(filteredCoins.length / coinsPerPage);
        if (totalPages <= 1) {
            container.innerHTML = '';
            return;
        }
        
        let html = `<button class="pagination-btn px-4 py-2 bg-gray-700 rounded-lg ${currentPage === 1 ? 'opacity-50 cursor-not-allowed' : ''}" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
        
        for (let i = 1; i <= Math.min(totalPages, 5); i++) {
            html += `<button class="pagination-btn px-4 py-2 rounded-lg ${currentPage === i ? 'bg-yellow-500 text-black' : 'bg-gray-700 hover:bg-yellow-500/50'}" onclick="changePage(${i})">${i}</button>`;
        }
        
        html += `<button class="pagination-btn px-4 py-2 bg-gray-700 rounded-lg ${currentPage === totalPages ? 'opacity-50 cursor-not-allowed' : ''}" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
        container.innerHTML = html;
    }
    
    function changePage(page) {
        const totalPages = Math.ceil(filteredCoins.length / coinsPerPage);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderCoins();
        renderPagination();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    // Модальне вікно
    function openModal(coinId) {
        const coin = allCoins.find(c => c.id === coinId);
        if (!coin) return;
        currentCoinId = coinId;
        
        const modal = document.getElementById('coinModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        
        modalTitle.textContent = coin.name.en;
        
        modalContent.innerHTML = `
            <div class="flex flex-col md:flex-row gap-6">
                <div class="md:w-1/2">
                    <div class="bg-gray-700 rounded-xl h-64 flex items-center justify-center">
                        <i class="fas fa-coins text-6xl text-yellow-500"></i>
                    </div>
                </div>
                <div class="md:w-1/2">
                    <div class="space-y-3">
                        <p><span class="text-gray-400">Country:</span> ${coin.country}</p>
                        <p><span class="text-gray-400">Year:</span> ${coin.year}</p>
                        <p><span class="text-gray-400">Denomination:</span> ${coin.denomination}</p>
                        <p><span class="text-gray-400">Metal:</span> ${coin.metal}</p>
                        <p><span class="text-gray-400">Weight:</span> ${coin.weight}g</p>
                        <p><span class="text-gray-400">Diameter:</span> ${coin.diameter}mm</p>
                        <p><span class="text-gray-400">Mintage:</span> ${coin.mintage?.toLocaleString() || 'Unknown'}</p>
                        <p><span class="text-gray-400">Rarity:</span> <span class="text-yellow-500 font-bold">${coin.rarity}/10</span></p>
                        <p><span class="text-gray-400">Price:</span> <span class="text-yellow-500 font-bold text-2xl">$${coin.priceUSD}</span> / ${coin.priceUAH} UAH</p>
                    </div>
                </div>
            </div>
            <div class="mt-6 p-4 bg-gray-700 rounded-xl">
                <h4 class="font-bold text-yellow-500 mb-2"><i class="fas fa-history mr-2"></i>History</h4>
                <p class="text-gray-300">${coin.history?.en || 'No historical information available for this coin.'}</p>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="addToCollection('${coin.id}')" class="flex-1 bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 rounded-lg transition">
                    <i class="fas fa-plus-circle mr-2"></i>Add to Collection
                </button>
                <button onclick="addToWishlist('${coin.id}')" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 rounded-lg transition">
                    <i class="fas fa-heart mr-2"></i>Add to Wishlist
                </button>
            </div>
        `;
        
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }
    
    function closeModal() {
        const modal = document.getElementById('coinModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        currentCoinId = null;
    }
    
    // Додавання до колекції
    function addToCollection(coinId) {
        if (!window.currentUser) {
            showToast('Please sign in to add coins to your collection', 'error');
            openAuthModal();
            return;
        }
        addToUserCollection(window.currentUser.uid, coinId);
        showToast('Coin added to your collection!', 'success');
    }
    
    function addToWishlist(coinId) {
        if (!window.currentUser) {
            showToast('Please sign in to add coins to your wishlist', 'error');
            openAuthModal();
            return;
        }
        addToWishlist(window.currentUser.uid, coinId);
        showToast('Coin added to your wishlist!', 'success');
    }
    
    function resetFilters() {
        if (document.getElementById('searchInput')) document.getElementById('searchInput').value = '';
        if (document.getElementById('countryFilter')) document.getElementById('countryFilter').value = '';
        document.querySelectorAll('.metal-filter').forEach(cb => cb.checked = false);
        if (document.getElementById('yearFrom')) document.getElementById('yearFrom').value = '';
        if (document.getElementById('yearTo')) document.getElementById('yearTo').value = '';
        if (document.getElementById('priceMin')) document.getElementById('priceMin').value = '';
        if (document.getElementById('priceMax')) document.getElementById('priceMax').value = '';
        if (document.getElementById('rarityMin')) document.getElementById('rarityMin').value = '';
        if (document.getElementById('rarityMax')) document.getElementById('rarityMax').value = '';
        applyFilters();
    }
    
    // Ініціалізація
    document.addEventListener('DOMContentLoaded', () => {
        loadCatalogData();
        AOS.init({ duration: 600, once: true });
    });
    
    // Глобальний експорт
    window.applyFilters = applyFilters;
    window.resetFilters = resetFilters;
    window.changePage = changePage;
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.addToCollection = addToCollection;
    window.addToWishlist = addToWishlist;
</script>

</body>
</html>
